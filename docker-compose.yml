services:
  bot:
    build: .
    container_name: polyedge_bot
    init: true
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    env_file:
      - ./config/.env
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro

  dashboard:
    build: .
    container_name: polyedge_dashboard
    init: true
    restart: unless-stopped
    env_file:
      - ./config/.env
    command:
      - streamlit
      - run
      - polyedge/dashboard.py
      - --server.port
      - "8502"
      - --server.address
      - 0.0.0.0
      - --server.headless
      - "true"
      - --server.enableWebsocketCompression
      - "false"
      - --browser.gatherUsageStats
      - "false"
    ports:
      - "8502:8502"
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
